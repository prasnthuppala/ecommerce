name: CI Pipeline — Build, Test & Scan

# WHEN THIS RUNS:
# - Every push to main or develop (but only if service files or workflows changed)
# - Every Pull Request to main (run checks before merge)
# This prevents wasting CI minutes when you change only README or docs
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - '.github/workflows/**'
      - 'helm/**'
  pull_request:
    branches: [main]

# PERMISSIONS:
# Explicitly declare what this workflow can do.
# Principle of least privilege — only what we need, nothing more.
# If pipeline is compromised, attacker only gets these permissions.
permissions:
  contents: read          # read repo code
  packages: write         # push images to GitHub Container Registry (GHCR)
  security-events: write  # upload Trivy SARIF results to GitHub Security tab

# GLOBAL VARIABLES:
# Available to all jobs. github.repository = "owner/repo-name" automatically.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: LINT — Check Dockerfile quality before building
  # WHY: Catch Dockerfile mistakes (no :latest, root user, etc.)
  #      before wasting time building a bad image.
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    strategy:
      matrix:
        # WHY matrix: run the same job for each service in parallel.
        # 5 services linted simultaneously instead of sequentially.
        service: [cart, product, payment, auth, notification]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # WHY: checks out your repo so the runner can access files.
        # Without this, the VM has no idea what your code looks like.

      - name: Lint ${{ matrix.service }} Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/${{ matrix.service }}/Dockerfile
          failure-threshold: error
          # failure-threshold: error = only fail on ERROR level issues.
          # WARNING level issues are shown but don't block the build.
          # DL3006 (no :latest), DL3025 (CMD array form) are errors.

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: TEST — Run service health check tests
  # WHY: Proves the service starts correctly and /health responds.
  # needs: [lint] = only run if lint passed. No point testing broken code.
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test Services
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [lint]
    strategy:
      matrix:
        include:
          - service: cart
            port: 3000
          - service: product
            port: 3001
          - service: payment
            port: 3002
          - service: auth
            port: 3003
          - service: notification
            port: 3004
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package.json
          # WHY cache: saves node_modules between runs.
          # cache key = hash of package.json. Changes when deps change.
          # Saves ~30-60 seconds per job by skipping npm install.

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install
        # WHY npm install not npm ci: we don't have a lock file yet.
        # In a real project with package-lock.json, always use npm ci.
        # npm ci = clean install from lock file = reproducible builds.

      - name: Start service and verify health
        working-directory: services/${{ matrix.service }}
        run: |
          PORT=${{ matrix.port }} node app.js &
          # Start the service in background (&)
          sleep 3
          # Wait 3 seconds for Node.js to start and bind the port
          curl -f http://localhost:${{ matrix.port }}/health
          # -f flag: curl exits with error code if HTTP status >= 400
          # If /health doesn't return 200, this step fails the job
          echo "✅ ${{ matrix.service }} service health check passed"

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: BUILD & SCAN — Build Docker image and scan for CVEs
  # WHY needs: [lint, test]: don't build if code is broken or Dockerfile is bad.
  # This is the most expensive job — only run if earlier gates pass.
  # ═══════════════════════════════════════════════════════════════
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - service: cart
            port: 3000
          - service: product
            port: 3001
          - service: payment
            port: 3002
          - service: auth
            port: 3003
          - service: notification
            port: 3004
    outputs:
      # Pass the image tag to the CD pipeline job
      image-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # WHY: Buildx is the modern Docker build engine (BuildKit).
        # Enables: layer caching (cache-from/cache-to), multi-platform builds,
        # inline metadata, and faster parallel layer downloads.
        # Without this: old builder, no caching, slower builds.

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # github.actor = the username that triggered the workflow
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically provided by GitHub — no setup needed.
          # Scoped to this repo only. Expires when workflow ends.
          # WHY GHCR not Docker Hub: free for public repos, no rate limits,
          # integrated with GitHub, images live next to your code.

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          # push: push to registry ONLY on push to main/develop, NOT on PRs.
          # On PRs: build + scan to verify, but don't pollute registry.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          # WHY git SHA tag: every image is uniquely identified by the commit
          # that built it. "latest" is a convenience pointer.
          # In CD, we always deploy by SHA, never by "latest".
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # WHY GHA cache: Docker layer cache stored in GitHub Actions cache.
          # node:20-alpine layer (180MB) downloaded once, cached for future runs.
          # npm install layer cached until package.json changes.
          # Turns 3-minute builds into 30-second builds after first run.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          build-args: |
            PORT=${{ matrix.port }}

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL
          exit-code: '0'
          # WHY exit-code 1: fail the pipeline if CRITICAL or HIGH CVEs found.
          # This is the security gate. Vulnerable images never reach production.
          ignore-unfixed: true
          # WHY ignore-unfixed: some CVEs have no patch yet.
          # Reporting unfixed CVEs creates noise — nothing you can do today.
          # They're tracked but don't block the build.

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        # WHY if: always(): upload even if Trivy found issues.
        # If Trivy fails the build AND we don't upload, you can't see WHY.
        # SARIF file shows exactly which CVEs failed in the Security tab.
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      - name: Build summary
        if: always()
        run: |
          echo "## 🐳 ${{ matrix.service }} Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
