replicaCount: 1
image:
  repository: ghcr.io/prasnthuppala/devops-portfolio/notification
  pullPolicy: IfNotPresent
  tag: "latest"
service:
  type: ClusterIP
  port: 80
  targetPort: 3004
env:
  PORT: "3004"
  NODE_ENV: production
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
